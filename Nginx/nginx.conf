# Nginx Configuration for Atlas-M30
# Serves static files from ~/uptime_website on port 8080.
# Termux note: ~ expands to /data/data/com.termux/files/home
# Config location: $PREFIX/etc/nginx/nginx.conf

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 8080;
        server_name localhost;

        # ~/uptime_website — nginx does not expand ~, so use the absolute path.
        root /data/data/com.termux/files/home/uptime_website;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /data/data/com.termux/files/usr/share/nginx/html;
        }
    }
}
